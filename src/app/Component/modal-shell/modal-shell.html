<div *ngIf="open" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4" role="dialog" aria-modal="true">
  <div class="relative w-full max-w-2xl rounded-3xl bg-white p-6 shadow-xl">
    <div class="flex items-start justify-between gap-4">
      <h3 class="text-lg font-semibold text-gray-900">{{ title }}</h3>

      <button
        type="button"
        class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200"
        (click)="close.emit()"
        aria-label="Fermer">
        ✕
      </button>
    </div>

    <div class="mt-6 relative">
      <div *ngIf="loading" class="absolute inset-0 z-10 flex items-center justify-center bg-white/70 rounded-2xl">
        <div class="text-sm text-gray-700">Chargement...</div>
      </div>
      <div [class.opacity-60]="loading" class="transition-opacity">
        <ng-content></ng-content>
      </div>
    </div>
  </div>
</div>
