<form (ngSubmit)="onSubmit()" #f="ngForm" class="px-6 py-5">
    <div class="grid grid-cols-1 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-900 mb-2">
                Désignation <span class="text-red-500">*</span>
            </label>
            <input [(ngModel)]="formValue.libelle" name="libelle" required
                class="mt-1 w-full rounded-xl border border-gray-200 bg-white px-4 py-2.5 text-sm text-gray-900 outline-none focus:border-blue-200 focus:ring-4 focus:ring-blue-100"
                placeholder="Ex: Piscine, Salle de sport..." />
        </div>
    </div>

    <div class="mt-6 flex items-center justify-end gap-3">
        <button type="button" [disabled]="loading || formSubmitting"
            class="rounded-xl border border-gray-200 bg-white px-5 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50"
            (click)="cancel.emit()"> Annuler </button>
        <button type="submit" [disabled]="loading || f.invalid || formSubmitting"
            class="rounded-xl bg-blue-600 px-6 py-2.5 text-sm font-semibold text-white hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed">
            <span *ngIf="!loading && !formSubmitting">Ajouter</span>
            <span *ngIf="loading || formSubmitting">Création...</span>
        </button>
    </div>
</form>
