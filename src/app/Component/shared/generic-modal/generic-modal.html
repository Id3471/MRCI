<div *ngIf="open" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4" role="dialog"
    aria-modal="true">
    <div [class]="'w-full bg-white shadow-xl rounded-2xl relative ' + maxWidthClass">
        <div class="flex items-center justify-center relative px-6 py-4 border-b border-gray-100">
            <h3 class="text-lg font-semibold text-gray-900">{{ titre }}</h3>
            <button type="button"
                class="absolute right-4 top-1/2 -translate-y-1/2 inline-flex h-9 w-9 items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-700"
                (click)="close.emit()">✕</button>
        </div>
        <ng-content></ng-content>
    </div>
</div>
