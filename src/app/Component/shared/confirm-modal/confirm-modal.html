<div *ngIf="open" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4" role="dialog"
    aria-modal="true">
    <div class="w-full max-w-lg rounded-3xl bg-white p-6 shadow-xl">
        <div class="flex items-start justify-between gap-4">
            <div>
                <h3 class="text-lg font-semibold text-gray-900">{{ titre }}</h3>
                <p class="mt-2 text-sm text-gray-600">{{ message }}</p>
            </div>
            <button type="button"
                class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200"
                (click)="cancel.emit()">✕</button>
        </div>
        <div class="mt-6 flex flex-col gap-3 sm:flex-row sm:justify-end">
            <button type="button"
                class="rounded-xl border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50"
                (click)="cancel.emit()">Annuler</button>
            <button type="button" class="rounded-xl px-4 py-2 text-sm font-semibold text-white"
                [ngClass]="confirmColorClass" (click)="confirm.emit()">
                {{ confirmButtonLabel }}
            </button>
        </div>
    </div>
</div>
