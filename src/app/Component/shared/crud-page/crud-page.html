<div class="dashboard-page px-6 py-6">

    <div class="flex justify-between items-center">

        <h2 class="font-bold text-xl">
            {{ title }}
        </h2>

        <button class="bg-red-600 text-white px-4 py-2 rounded-xl" (click)="create.emit()">

            Ajouter

        </button>

    </div>

    <div class="mt-4">

        <input type="search" [ngModel]="searchTerm" (ngModelChange)="searchChange.emit($event)"
            placeholder="Rechercher..." class="w-full border rounded-xl p-3">

    </div>

    <div class="overflow-auto mt-4">

        <table class="w-full">

            <thead>

                <tr>

                    <th *ngFor="let col of columns" class="text-left p-3">

                        {{ col.label }}

                    </th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                <tr *ngFor="let row of data">

                    <td *ngFor="let col of columns" class="p-3">

                        {{ row[col.key] }}

                    </td>

                    <td>

                        <button (click)="edit.emit(row)">

                            ✏️

                        </button>

                        <button (click)="toggle.emit(row)">

                            🔄

                        </button>

                        <button (click)="delete.emit(row)">

                            🗑️

                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

    <div class="flex justify-between mt-4">

        <button [disabled]="page <= 1" (click)="prevPage.emit()">

            ←

        </button>

        <span>

            {{ page }} / {{ lastPage }}

        </span>

        <button [disabled]="page >= lastPage" (click)="nextPage.emit()">

            →

        </button>

    </div>

</div>
