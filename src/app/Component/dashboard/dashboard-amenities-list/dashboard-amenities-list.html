<app-dashboard-card [subtitle]="'Top Commodités'" [title]="'5 commodités fréquentes'">
  <div class="mt-4 space-y-3">
    <div *ngFor="let item of data" class="flex items-center justify-between gap-4 rounded-2xl bg-slate-50 px-4 py-3">
      <div>
        <p class="font-medium text-gray-900">{{ item.amenity }}</p>
        <p class="text-sm text-gray-500">Présente dans {{ item.count }} logements</p>
      </div>
      <span class="text-sm font-semibold text-gray-900">{{ item.percent }}%</span>
    </div>
  </div>
</app-dashboard-card>
