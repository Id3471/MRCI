<form (ngSubmit)="onSubmit()" #f="ngForm" enctype="multipart/form-data" class="px-6 py-5">
    <div class="grid grid-cols-1 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-900"> Dénomination <span class="text-red-500">*</span>
            </label>
            <input [(ngModel)]="formValue.denomination" name="denomination" required
                class="mt-1 w-full rounded-xl border border-gray-200 bg-white px-4 py-2.5 text-sm text-gray-900 outline-none focus:border-red-200 focus:ring-4 focus:ring-red-100"
                placeholder="Nom" />
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-900"> Contact <span class="text-red-500">*</span>
                </label>
                <input [(ngModel)]="formValue.contact" name="contact" required
                    class="mt-1 w-full rounded-xl border border-gray-200 bg-white px-4 py-2.5 text-sm text-gray-900 outline-none focus:border-red-200 focus:ring-4 focus:ring-red-100"
                    placeholder="Contact" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-900"> Email <span class="text-red-500">*</span>
                </label>
                <input [(ngModel)]="formValue.email" name="email" type="email" required
                    class="mt-1 w-full rounded-xl border border-gray-200 bg-white px-4 py-2.5 text-sm text-gray-900 outline-none focus:border-red-200 focus:ring-4 focus:ring-red-100"
                    placeholder="Email" />
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-900"> Nom du Gérant <span
                        class="text-red-500">*</span> </label>
                <input [(ngModel)]="formValue.manager" name="manager" required
                    class="mt-1 w-full rounded-xl border border-gray-200 bg-white px-4 py-2.5 text-sm text-gray-900 outline-none focus:border-red-200 focus:ring-4 focus:ring-red-100"
                    placeholder="Nom gérant" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-900">Logo</label>
                <input (change)="onLogoPicked($event)" name="logo" type="file" accept="image/*"
                    class="mt-1 w-full cursor-pointer rounded-xl border border-gray-200 bg-gray-50 px-3 py-2.5 text-sm text-gray-800 file:mr-3 file:rounded-lg file:border-0 file:bg-red-50 file:px-3 file:py-1.5 file:text-red-600" />
                <p class="mt-1 text-xs text-gray-500">PNG, JPG (MAX. 2MB env.)</p>
            </div>
        </div>
    </div>

    <div class="mt-6 flex items-center justify-end gap-3">
        <!-- Attention ici : on appelle cancel.emit() -->
        <button type="button" [disabled]="loading || f.invalid"
            class="rounded-xl border border-gray-200 bg-white px-5 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50"
            (click)="cancel.emit()"> Annuler </button>
        <button type="submit" [disabled]="loading || f.invalid"
            class="rounded-xl bg-red-600 px-6 py-2.5 text-sm font-semibold text-white hover:bg-red-500 disabled:opacity-50 disabled:cursor-not-allowed">
            <span *ngIf="!loading">Ajouter</span> <span *ngIf="loading">Création...</span>
        </button>
    </div>
</form>
