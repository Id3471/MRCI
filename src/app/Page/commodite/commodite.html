<div class="p-4">
  <div class="flex items-center justify-between mb-4">
    <h3 class="text-md font-bold">Commodités</h3>
    <div>
      <button class="bg-primary text-white px-4 py-2 rounded" (click)="openCreate()">Ajouter</button>
    </div>
  </div>

  <div *ngIf="error" class="text-red-600 mb-4">{{ error }}</div>
  <div *ngIf="successMessage" class="text-green-600 mb-4">{{ successMessage }}</div>

  <div class="overflow-x-auto">
    <table class="w-full text-sm text-left">
      <thead class="text-xs uppercase bg-primary-light">
        <tr>
          <th class="px-4 py-2">Libellé</th>
          <th class="px-4 py-2">Statut</th>
          <th class="px-4 py-2">Date création</th>
          <th class="px-4 py-2">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of commodites" class="border-b">
          <td class="px-4 py-2">{{ c.libelle }}</td>
          <td class="px-4 py-2">{{ c.statut ? 'Actif' : 'Inactif' }}</td>
          <td class="px-4 py-2">{{ c.created_at }}</td>
          <td class="px-4 py-2">
            <button class="me-2" (click)="openEdit(c)">Modifier</button>
            <button class="me-2" (click)="confirmToggle(c)">{{ c.statut ? 'Désactiver' : 'Activer' }}</button>
            <button class="text-red-600" (click)="confirmDelete(c)">Supprimer</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Create Modal -->
  <div *ngIf="showCreate" class="modal-overlay">
    <div class="modal">
      <h4>Ajouter une commodité</h4>
      <div class="mt-2">
        <label>Libellé</label>
        <input class="w-full p-2 border rounded" [(ngModel)]="createLibelle" />
      </div>
      <div class="mt-4 flex justify-end">
        <button class="me-2" (click)="showCreate=false">Annuler</button>
        <button class="bg-primary text-white px-3 py-1 rounded" (click)="submitCreate()">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div *ngIf="showEdit" class="modal-overlay">
    <div class="modal">
      <h4>Modifier la commodité</h4>
      <div class="mt-2">
        <label>Libellé</label>
        <input class="w-full p-2 border rounded" [(ngModel)]="editLibelle" />
      </div>
      <div class="mt-4 flex justify-end">
        <button class="me-2" (click)="showEdit=false">Annuler</button>
        <button class="bg-primary text-white px-3 py-1 rounded" (click)="submitEdit()">Modifier</button>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div *ngIf="showConfirm" class="modal-overlay">
    <div class="modal">
      <h4>Confirmation</h4>
      <p class="mt-2">{{ confirmMessage }}</p>
      <div class="mt-4 flex justify-end">
        <button class="me-2" (click)="closeConfirm()">Annuler</button>
        <button class="bg-red-600 text-white px-3 py-1 rounded"
          (click)="confirmAction && confirmAction()">Confirmer</button>
      </div>
    </div>
  </div>

</div>
