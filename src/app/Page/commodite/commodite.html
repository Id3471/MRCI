<app-crud-page titre="Liste des commodités" searchPlaceholder="Rechercher par désignation..."
  [data]="displayedCommodites" [columns]="tableColumns"
  [actionsConfig]="{ canEdit: true, canDelete: true, canToggle: true, toggleKey: 'statut' }" [page]="page"
  [perPage]="perPage" [total]="total" [lastPage]="lastPage" [errorMessage]="errorMessage"
  [successMessage]="successMessage" (searchChange)="onSearchChange($event)" (perPageChange)="onPerPageChange($event)"
  (pageChange)="onPageChange($event)" (addClick)="openCreate()" (editClick)="openEdit($event)"
  (deleteClick)="openConfirmDelete($event)" (toggleClick)="openConfirmToggle($event)">
</app-crud-page>

<app-generic-modal [open]="createOpen" titre="Ajouter une commodité" (close)="closeCreate()" maxWidthClass="max-w-md">
  <app-create [loading]="isCreating" (create)="onCreateSubmit($event)" (cancel)="closeCreate()" />
</app-generic-modal>

<app-generic-modal [open]="editOpen" titre="Modification d'une commodité" (close)="closeEdit()"
  maxWidthClass="max-w-md">
  <app-update [targetId]="editTargetId" [initialValue]="editFormData" [commodite]="itemToEdit"
    (OnSubmit)="onEditSubmit($event)" (cancel)="closeEdit()" />
</app-generic-modal>

<app-confirm-modal [open]="confirmOpen" [titre]="confirmtitre" [message]="confirmMessage"
  [confirmButtonLabel]="confirmButtonLabel" [confirmColorClass]="confirmColorClass" (confirm)="confirmAction?.()"
  (cancel)="cancelConfirm()">
</app-confirm-modal>
