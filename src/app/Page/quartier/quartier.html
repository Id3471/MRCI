<app-crud-page
  titre="Liste des quartiers par commune"
  searchPlaceholder="Rechercher par nom de quartier ou de commune..."
  [data]="displayedQuartiers"
  [columns]="tableColumns"
  [actionsConfig]="{ canEdit: true, canDelete: true, canToggle: false }"
  [page]="page"
  [perPage]="perPage"
  [total]="total"
  [lastPage]="lastPage"
  [errorMessage]="errorMessage"
  [successMessage]="successMessage"
  
  (searchChange)="onSearchChange($event)"
  (perPageChange)="onPerPageChange($event)"
  (pageChange)="onPageChange($event)"
  (addClick)="openCreate()"
  (editClick)="openEdit($event)"
  (deleteClick)="openConfirmDelete($event)">
</app-crud-page>

<app-generic-modal [open]="createOpen" titre="Ajouter un quartier" (close)="closeCreate()" maxWidthClass="max-w-md">
  <app-create-quartier [loading]="isCreating" [communes]="communesList" (create)="onCreateSubmit($event)" (cancel)="closeCreate()" />
</app-generic-modal>

<app-generic-modal [open]="editOpen" titre="Modification du quartier" (close)="closeEdit()" maxWidthClass="max-w-md">
  <app-update-quartier [targetId]="editTargetId" [communes]="communesList" [initialValue]="editFormData" [quartier]="itemToEdit" (OnSubmit)="onEditSubmit($event)" (cancel)="closeEdit()" />
</app-generic-modal>

<app-confirm-modal
  [open]="confirmOpen"
  [titre]="confirmtitre"
  [message]="confirmMessage"
  [confirmButtonLabel]="confirmButtonLabel"
  [confirmColorClass]="confirmColorClass"
  (confirm)="confirmAction?.()"
  (cancel)="cancelConfirm()">
</app-confirm-modal>
