<app-crud-page
  titre="Liste des résidences"
  searchPlaceholder="Rechercher par nom, email, code ou manager"
  [data]="displayedResidences"
  [columns]="tableColumns"
  [actionsConfig]="{ canEdit: true, canDelete: true, canToggle: true, toggleKey: 'statut' }"
  [page]="page"
  [perPage]="perPage"
  [total]="total"
  [lastPage]="lastPage"
  [errorMessage]="errorMessage"
  [successMessage]="successMessage"
  
  (searchChange)="onSearchChange($event)"
  (perPageChange)="onPerPageChange($event)"
  (pageChange)="onPageChange($event)"
  (addClick)="openCreate()"
  (editClick)="openEdit($event)"
  (deleteClick)="openConfirmDelete($event)"
  (toggleClick)="openConfirmToggle($event)">
</app-crud-page>

<app-generic-modal [open]="createOpen" titre="Ajouter une résidence" (close)="closeCreate()">
  <app-residence-create-modal [loading]="isCreating" (create)="onCreateSubmit($event)" (cancel)="closeCreate()" />
</app-generic-modal>

<app-generic-modal [open]="editOpen" titre="Modification de la résidence" (close)="closeEdit()">
  <app-residence-edit-modal [targetId]="editTargetId" [initialValue]="editFormData" [initialLogoUrl]="editLogoUrl" [residence]="resitoedit" (OnSubmit)="onEditSubmit($event)" (cancel)="closeEdit()" />
</app-generic-modal>

<app-confirm-modal
  [open]="confirmOpen"
  [titre]="confirmtitre"
  [message]="confirmMessage"
  [confirmButtonLabel]="confirmButtonLabel"
  [confirmColorClass]="confirmColorClass"
  (confirm)="confirmAction?.()"
  (cancel)="cancelConfirm()">
</app-confirm-modal>
