<!-- Section d'attribution de profil par lot -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4 p-5 bg-white border border-gray-200 rounded-xl shadow-sm">
  <div class="md:col-span-2">
    <label class="block mb-2 text-sm font-medium text-gray-900">
      Profils à attribuer <span class="text-red-600">*</span>
    </label>
    <select [(ngModel)]="selectedProfilId" class="bg-white border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 block w-full p-2.5 outline-none transition-all">
      <option [value]="null">------------------</option>
      <option *ngFor="let profil of profils" [value]="profil.id">
        {{ profil.libelle }}
      </option>
    </select>
  </div>
  <div class="flex items-end shadow-none">
    <button type="button" (click)="onAssignProfile()" [disabled]="!selectedProfilId || isAssigning"
            class="w-full text-white bg-blue-600 hover:bg-blue-700 disabled:opacity-50 focus:ring-4 focus:outline-none focus:ring-blue-100 font-medium rounded-xl text-sm px-8 py-3 text-center transition-all">
      <i class="fa mr-2" [ngClass]="isAssigning ? 'fa-spinner fa-spin' : 'fa-check'"></i> ATTRIBUER
    </button>
  </div>
</div>

<!-- Composant de page CRUD Générique -->
<app-crud-page
  titre="La liste des utilisateurs"
  searchPlaceholder="Rechercher par nom ou email"
  [data]="displayedUsers"
  [columns]="tableColumns"
  [actionsConfig]="{ canEdit: true, canDelete: true, canToggle: true, toggleKey: 'statut' }"
  [page]="page"
  [perPage]="perPage"
  [total]="total"
  [lastPage]="lastPage"
  [errorMessage]="errorMessage"
  [successMessage]="successMessage"
  
  (searchChange)="onSearchChange($event)"
  (perPageChange)="onPerPageChange($event)"
  (pageChange)="onPageChange($event)"
  (addClick)="openCreate()"
  (editClick)="openEdit($event)"
  (deleteClick)="openConfirmDelete($event)"
  (toggleClick)="openConfirmToggle($event)">
</app-crud-page>

<!-- Modal d'ajout d'un utilisateur -->
<app-generic-modal [open]="createOpen" titre="Ajouter un utilisateur" (close)="closeCreate()">
  <app-create-user
    [loading]="isCreating" 
    [residences]="residences"
    (create)="onCreateSubmit($event)" 
    (cancel)="closeCreate()" />
</app-generic-modal>

<!-- Modal de modification d'un utilisateur -->
<app-generic-modal [open]="editOpen" titre="Modification Utilisateur" (close)="closeEdit()">
  <app-update-user
    [targetId]="editTargetId" 
    [initialValue]="editFormData" 
    [residences]="residences"
    [user]="usertoedit" 
    (OnSubmit)="onEditSubmit($event)" 
    (cancel)="closeEdit()" />
</app-generic-modal>

<!-- Modal de confirmation des actions sensibles (Suppression / Toggle Statut) -->
<app-confirm-modal
  [open]="confirmOpen"
  [titre]="confirmtitre"
  [message]="confirmMessage"
  [confirmButtonLabel]="confirmButtonLabel"
  [confirmColorClass]="confirmColorClass"
  (confirm)="confirmAction?.()"
  (cancel)="cancelConfirm()">
</app-confirm-modal>
