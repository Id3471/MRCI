<app-crud-page
  titre="Liste des communes"
  searchPlaceholder="Rechercher une commune par nom..."
  [data]="displayedCommunes"
  [columns]="tableColumns"
  [actionsConfig]="{ canEdit: true, canDelete: true, canToggle: false }"
  [page]="page"
  [perPage]="perPage"
  [total]="total"
  [lastPage]="lastPage"
  [errorMessage]="errorMessage"
  [successMessage]="successMessage"
  
  (searchChange)="onSearchChange($event)"
  (perPageChange)="onPerPageChange($event)"
  (pageChange)="onPageChange($event)"
  (addClick)="openCreate()"
  (editClick)="openEdit($event)"
  (deleteClick)="openConfirmDelete($event)">
</app-crud-page>

<app-generic-modal [open]="createOpen" titre="Ajouter une commune" (close)="closeCreate()" maxWidthClass="max-w-md">
  <app-commune-create-modal [loading]="isCreating" (create)="onCreateSubmit($event)" (cancel)="closeCreate()" />
</app-generic-modal>

<app-generic-modal [open]="editOpen" titre="Modification de la commune" (close)="closeEdit()" maxWidthClass="max-w-md">
  <app-commune-edit-modal [targetId]="editTargetId" [initialValue]="editFormData" [commune]="itemToEdit" (OnSubmit)="onEditSubmit($event)" (cancel)="closeEdit()" />
</app-generic-modal>

<app-confirm-modal
  [open]="confirmOpen"
  [titre]="confirmtitre"
  [message]="confirmMessage"
  [confirmButtonLabel]="confirmButtonLabel"
  [confirmColorClass]="confirmColorClass"
  (confirm)="confirmAction?.()"
  (cancel)="cancelConfirm()">
</app-confirm-modal>
