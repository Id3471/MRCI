<app-crud-page
  titre="La liste des profils"
  searchPlaceholder="Rechercher un profil..."
  [data]="displayedProfils"
  [columns]="tableColumns"
  [actionsConfig]="{ canEdit: true, canDelete: true, canToggle: true, toggleKey: 'statut' }"
  [page]="page"
  [perPage]="perPage"
  [total]="total"
  [lastPage]="lastPage"
  [errorMessage]="errorMessage"
  [successMessage]="successMessage"
  
  (searchChange)="onSearchChange($event)"
  (perPageChange)="onPerPageChange($event)"
  (pageChange)="onPageChange($event)"
  (addClick)="openCreate()"
  (editClick)="openEdit($event)"
  (deleteClick)="openConfirmDelete($event)"
  (toggleClick)="openConfirmToggle($event)">
</app-crud-page>

<app-generic-modal [open]="createOpen" titre="Ajouter un profil" (close)="closeCreate()" maxWidthClass="max-w-4xl">
  <app-create-profil [loading]="isCreating" (create)="onCreateSubmit($event)" (cancel)="closeCreate()" />
</app-generic-modal>

<app-generic-modal [open]="editOpen" titre="Modification du profil" (close)="closeEdit()" maxWidthClass="max-w-4xl">
  <app-update-profil [targetId]="editTargetId" [initialValue]="editFormData" [profil]="itemToEdit" (OnSubmit)="onEditSubmit($event)" (cancel)="closeEdit()" />
</app-generic-modal>

<app-confirm-modal
  [open]="confirmOpen"
  [titre]="confirmtitre"
  [message]="confirmMessage"
  [confirmButtonLabel]="confirmButtonLabel"
  [confirmColorClass]="confirmColorClass"
  (confirm)="confirmAction?.()"
  (cancel)="cancelConfirm()">
</app-confirm-modal>
